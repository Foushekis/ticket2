<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="white">
<title>Εισιτήριο - Παναθηναϊκός</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #f2f2f7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .phone-wrap { width: 100%; max-width: 430px; min-height: 100vh; background: #f2f2f7; display: flex; flex-direction: column; }
  .status-bar { background: white; padding: 14px 20px 10px; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; position: sticky; top: 0; z-index: 10; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .nav-bar { background: white; padding: 10px 16px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #e0e0e0; position: sticky; top: 46px; z-index: 10; }
  .nav-title { font-size: 17px; font-weight: 600; color: #000; }
  .nav-btn { background: none; border: none; font-size: 22px; color: #007AFF; cursor: pointer; padding: 0 4px; line-height: 1; }
  .nav-icons { display: flex; gap: 16px; align-items: center; }
  .qr-section { background: white; padding: 28px 20px 20px; display: flex; flex-direction: column; align-items: center; }
  .qr-section img { width: 190px; height: 190px; margin-bottom: 12px; }
  .ticket-number { font-size: 15px; color: #333; letter-spacing: 0.5px; }
  .ticket-body { background: #1a3a8f; flex: 1; padding-bottom: 40px; }
  .ticket-row { padding: 16px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.18); }
  .ticket-row:last-child { border-bottom: none; }
  .row-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 5px; font-weight: 500; }
  .row-value { font-size: 19px; color: white; font-weight: 700; line-height: 1.3; }
  .holder-name { font-size: 22px; color: white; font-weight: 700; line-height: 1.2; }
  .row-grid { display: grid; grid-template-columns: repeat(4, 1fr); padding: 16px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.18); }
  .grid-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 5px; font-weight: 500; }
  .grid-value { font-size: 24px; color: white; font-weight: 700; }
</style>
</head>
<body>
<div class="phone-wrap">
  <div class="status-bar">
    <span id="clock">--:--</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="#000"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="#000"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#000"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#000" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.7 4.9L15.1 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 0.9 3.5L2.3 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#000"/><path d="M8 5.5C9.4 5.5 10.7 6.1 11.6 7L13 5.6C11.7 4.3 10 3.5 8 3.5C6 3.5 4.3 4.3 3 5.6L4.4 7C5.3 6.1 6.6 5.5 8 5.5Z" fill="#000"/><circle cx="8" cy="10" r="1.5" fill="#000"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#000" stroke-opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#000"/><path d="M24 4.5V8.5C25 8 25.5 7 25.5 6.5C25.5 6 25 5 24 4.5Z" fill="#000" opacity="0.4"/><text x="11" y="10" font-size="7" fill="white" text-anchor="middle" font-weight="700" font-family="-apple-system,sans-serif">72</text></svg>
    </div>
  </div>
  <div class="nav-bar">
    <button class="nav-btn">‹</button>
    <span class="nav-title">Εισιτήριο</span>
    <div class="nav-icons">
      <button class="nav-btn" style="font-size:20px;">⊕</button>
      <button class="nav-btn" style="font-size:20px;">⋮</button>
    </div>
  </div>
  <div class="qr-section">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASIAAAEiAQAAAAB1xeIbAAABj0lEQVR4nO2ZQW6DMBRE368tdWmkHKBHMVfrzeAoOUAkvIwEmi4MpEkrtZskhtgLwOJJHlmD/T2Y+Lv1b/+AoFKVqlSlKlU6ZXPzWJvM8sXMzNqn6to35fMtdgDpgGD0IrkRAHuWrlei0uxxM3vX8uSfr+uVKHWPHvF1KX/TN8LJ7jpipW6pIKkD1OHycUvS+Hxde6Zm3/fZ6w6LRz8C05X5S1W/bSrP/VWwMBmE66ihVPX7oXrz6LNxguSxNnmsLUDXvilrmczacDbiMNW99jEUkiR1YZzLy6h11w3S3C1V/bapvN5bHCYsavIiNRCHBuJx/QBKVb9tKvsewgjgdHE7UePyVZSqftvUpc7JlY0RJg+pAdJhqXZKVb9tavF9bi6v/JcX1fd3pOa5j5KkYTnSdoA0QN1rH0AtOea39R7WaK109Tuh4tEMkhksyU4Rul6B6hsna3GyfN4qRdcOqSVDDgISQDgZ/cfZADfW/1Z3pH7UOVqreg2u1jn3pH7JMddVPtT8vlKVqlSldkN9AWKuyoGTvIjSAAAAAElFTkSuQmCC" alt="QR Code"/>
    <span class="ticket-number">44940459-0</span>
  </div>
  <div class="ticket-body">
    <div class="ticket-row"><div class="row-label">Κάτοχος Εισιτηρίου</div><div class="holder-name">ΚΛΕΙΣΘΕΝΗΣ ΣΤΑΜΑΤΙΑΔΗΣ</div></div>
    <div class="ticket-row"><div class="row-label">Κωδικός Εισιτηρίου</div><div class="row-value">131546862565</div></div>
    <div class="ticket-row"><div class="row-label">Εκδήλωση</div><div class="row-value">ΚΑΕ ΠΑΝΑΘΗΝΑΪΚΟΣ AKTOR ΕΙΣΙΤΗΡΙΑ ΔΙΑΡΚΕΙΑΣ 2025-2026</div></div>
    <div class="ticket-row"><div class="row-label">Ισχύς Μέχρι</div><div class="row-value">01/08/2026</div></div>
    <div class="ticket-row"><div class="row-label">Γήπεδο</div><div class="row-value">TELEKOM CENTER ATHENS</div></div>
    <div class="row-grid">
      <div><div class="grid-label">Θύρα</div><div class="grid-value">3</div></div>
      <div><div class="grid-label">Τμήμα</div><div class="grid-value">103</div></div>
      <div><div class="grid-label">Σειρά</div><div class="grid-value">35</div></div>
      <div><div class="grid-label">Θέση</div><div class="grid-value">18</div></div>
    </div>
    <div class="ticket-row"><div class="row-label">Τύπος Εισιτηρίου</div><div class="row-value" style="font-size:22px;">ΔΙΑΡΚΕΙΑΣ</div></div>
  </div>
</div>
<script>
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 10000);
</script>
</body>
</html>
