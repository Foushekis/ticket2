<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Εισιτήριο - Παναθηναϊκός</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #f2f2f7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .phone-wrap { width: 100%; max-width: 430px; min-height: 100vh; background: #f2f2f7; display: flex; flex-direction: column; }
  .nav-bar { background: white; padding: 10px 16px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #e0e0e0; position: sticky; top: 0; z-index: 10; }
  .nav-title { font-size: 17px; font-weight: 600; color: #000; }
  .nav-btn { background: none; border: none; font-size: 22px; color: #007AFF; cursor: pointer; padding: 0 4px; line-height: 1; }
  .nav-icons { display: flex; gap: 16px; align-items: center; }
  .qr-section { background: white; padding: 28px 20px 20px; display: flex; flex-direction: column; align-items: center; }
  .qr-section img { width: 190px; height: 190px; margin-bottom: 12px; }
  .ticket-number { font-size: 15px; color: #333; letter-spacing: 0.5px; }
  .ticket-body { background: #1a3a8f; flex: 1; padding-bottom: 40px; }
  .ticket-row { padding: 16px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.18); }
  .ticket-row:last-child { border-bottom: none; }
  .row-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 5px; font-weight: 500; }
  .row-value { font-size: 19px; color: white; font-weight: 700; line-height: 1.3; }
  .holder-name { font-size: 22px; color: white; font-weight: 700; line-height: 1.2; }
  .row-grid { display: grid; grid-template-columns: repeat(4, 1fr); padding: 16px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.18); }
  .grid-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 5px; font-weight: 500; }
  .grid-value { font-size: 24px; color: white; font-weight: 700; }
</style>
</head>
